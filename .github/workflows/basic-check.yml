name: Basic Check

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: sqlite:///./ci_mes.db
      BLOCKCHAIN_BACKEND: mock

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Verify app imports
        run: |
          python - <<'PY'
          from app.main import app
          print(app.title)
          PY

      - name: Start API
        run: |
          python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 > uvicorn.log 2>&1 &
          echo $! > uvicorn.pid

      - name: Wait for health
        run: |
          for i in {1..20}; do
            if curl -fsS http://127.0.0.1:8000/health; then
              exit 0
            fi
            sleep 1
          done
          cat uvicorn.log
          exit 1

      - name: Smoke test core endpoints
        run: |
          curl -fsS http://127.0.0.1:8000/health
          curl -fsS http://127.0.0.1:8000/recipes
          curl -fsS http://127.0.0.1:8000/batches
          curl -fsS http://127.0.0.1:8000/mcp/tools

      - name: Stop API
        if: always()
        run: |
          kill "$(cat uvicorn.pid)" || true
